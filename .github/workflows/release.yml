name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pilot source is gitignored from this repo but src/go.mod has a
      # replace directive pointing at ../repos/pilotprotocol. Clone the
      # pinned Pilot tag into that path so GoReleaser can build.
      - name: Clone Pilot (for src/go.mod replace)
        run: |
          git clone --depth 1 --branch v1.7.2 \
            https://github.com/TeoSlayer/pilotprotocol.git \
            repos/pilotprotocol

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
